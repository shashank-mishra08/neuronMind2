<!DOCTYPE html>
<html>
<style>
  .hero-section {
    display: flex;
    align-items: center;
    border: 1px solid red;
    min-height: 200px;
  }
  .container {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    border: 1px solid blue;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 55% 45%;
  }
</style>
<body>
  <div class="hero-section">
    <div class="container">
      <div class="hero-grid">
        <div>Left</div>
        <div>Right</div>
      </div>
    </div>
  </div>
</body>
</html>
